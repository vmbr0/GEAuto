# GE Auto Import – ge-import.com
# Copier sur le VPS: sudo cp deploy/nginx-ge-import.conf /etc/nginx/sites-available/ge-import
# Activer: sudo ln -sf /etc/nginx/sites-available/ge-import /etc/nginx/sites-enabled/
# Tester: sudo nginx -t && sudo systemctl reload nginx
# HTTPS: sudo certbot --nginx -d ge-import.com -d www.ge-import.com

server {
    listen 80;
    server_name ge-import.com www.ge-import.com;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
